# version: '3.8'

services:
  # ----------------------------------------
  # Database & Administration (Local)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: my-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: my-pgadmin-v2
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-network

  # ----------------------------------------
  # Application Services
  # ----------------------------------------
  java-spring:    
    container_name: app-java-spring
    build:
      context: ./spring-service      # ✅ ชี้ไปที่โฟลเดอร์โปรเจกต์ตามรูป
      dockerfile: Dockerfile.dev     # ✅ ระบุให้ใช้ไฟล์ Dev แทนไฟล์ Prod    
    volumes:
      # 1. Map Source Code: แก้ไฟล์ในเครื่อง -> ส่งไป Container
      - ./spring-service/src:/app/src
      # 2. Map pom.xml: เผื่อมีการเพิ่ม dependency
      - ./spring-service/pom.xml:/app/pom.xml
      # 3. (Optional) Map Maven Cache: จะได้ไม่ต้องโหลด library ใหม่ทุกรอบ
      - ~/.m2:/root/.m2
    environment:
      - APP_JWT_SECRET=${JWT_SECRET_KEY}
      # 1. ✅ แก้ Host เป็น aws-1 (ตามรูปภาพ) และ Port 5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
      
      # 2. ✅ ใส่ Username ยาวๆ ของ Supabase ตรงนี้เลย (แยกกับ Local)
      - SPRING_DATASOURCE_USERNAME=postgres.vbgrlsngqobtxkpuxopj
      
      # 3. ✅ ใช้รหัสผ่านของ Supabase (ไม่ใช่ melgor)
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_PASSWORD}
      
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - _JAVA_OPTIONS=-Djava.net.preferIPv4Stack=true    
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:8080"
    networks:
      - app-network

  php-apache:
    build: ./php-service
    container_name: app-php-apache
    ports:
      - "8081:80"
    volumes:            
      - ./php-service/src:/var/www/html
    environment:
      - DB_HOST=${DB_HOST}  # เชื่อม Local Postgres
      - DB_USER=${DB_USER}        
      - DB_PASS=${DB_PASSWORD}    
      - DB_NAME=${DB_NAME} 
      - DB_PORT=${DB_PORT}        
    networks:
      - app-network

  express-api-gateway:
    build: ./express-gateway
    container_name: app-express-gateway
    environment:
      - SPRING_URL=http://java-spring:8080
      - PHP_URL=http://php-apache:80
    ports:
      - "3000:3000"
    volumes:
      - ./express-gateway:/app   
      - /app/node_modules        
    networks:
      - app-network

  react-vite:
    build: ./react-vite
    container_name: app-react-vite
    ports:
      - "5173:5173"
    volumes:
      - ./react-vite:/app        
      - /app/node_modules        
    environment:
      - CHOKIDAR_USEPOLLING=true 
    networks:
      - app-network

  # ----------------------------------------
  # Main Entry Point (Reverse Proxy)
  # ----------------------------------------
  nginx-proxy:
    image: nginx:alpine
    container_name: main-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-vite
      - express-api-gateway
      - php-apache
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:

