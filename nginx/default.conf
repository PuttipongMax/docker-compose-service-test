server {
    listen 80;
    server_name localhost;

    # 1. Frontend (React Vite)
    location / {
        proxy_pass http://react-vite:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 2. Node Express API Gateway
    # เรียก http://localhost/api/... จะวิ่งไปที่ Express
    location /api {
        proxy_pass http://express-api-gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Legacy PHP App
    # เรียก http://localhost/legacy/... จะวิ่งไปที่ PHP
    location /legacy {
        proxy_pass http://php-apache:80;
        proxy_set_header Host $host;
    }
    
    # ถ้าต้องการยิงตรงไป Java Spring (กรณีไม่ผ่าน Express)
    location /java-api {
        proxy_pass http://java-spring:8080;
    }
}